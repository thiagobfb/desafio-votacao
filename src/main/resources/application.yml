spring:
  application:
    name: votacao
  threads:
    virtual:
      enabled: true   # Java 21 virtual threads — Tomcat e @Async usam VT
  datasource:
    url: jdbc:h2:file:./data/votacao;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
    hikari:
      # Com virtual threads, mantemos pool pequeno — VTs enfileiram na conexão.
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 5000
      validation-timeout: 3000
      max-lifetime: 1800000
      pool-name: votacao-hikari
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        # Hibernate batch — habilita inserts em lote quando aplicável.
        jdbc.batch_size: 50
        order_inserts: true
        order_updates: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080
  error:
    include-stacktrace: never
    include-message: always
  # Tomcat — limites razoáveis para o cenário do desafio.
  tomcat:
    threads:
      max: 200
    accept-count: 100
    max-connections: 8192
  compression:
    enabled: true
    mime-types: application/json
    min-response-size: 1024

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

votacao:
  sessao:
    duracao-default-minutos: 1
    duracao-maxima-minutos: 1440

logging:
  level:
    root: INFO
    br.com.desafio.votacao: DEBUG

info:
  app:
    name: votacao
    description: Sistema de votação cooperativista — desafio técnico
    encoding: UTF-8
    java-version: 21
